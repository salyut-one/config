# Sign trusted submissions and verify untrusted inbound mail.
Mode                    sv
Syslog                  yes
SyslogSuccess           yes
LogWhy                  no
UserID                  opendkim:opendkim
Socket                  local:/run/opendkim/opendkim.sock
Umask                   007
Canonicalization        relaxed/relaxed
MinimumKeyBits          2048
SignatureAlgorithm      rsa-sha256
KeyTable                /etc/opendkim/KeyTable
SigningTable            refile:/etc/opendkim/SigningTable
InternalHosts           file:/etc/opendkim/TrustedHosts
OversignHeaders         From

# The BBS bridge trusts only this locally generated Authentication-Results
# authority. Remove a forged copy before adding verification results.
AuthservID              mail.salyut.one
RemoveARFrom            mail.salyut.one
RemoveARAll             yes
