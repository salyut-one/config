# Foreign envelope senders are rewritten when Postfix forwards their mail.
# Local senders retain their normal salyut.one return paths.
domains = { "salyut.one", "mail.salyut.one" }
srs-domain = "salyut.one"

# Postfix's cleanup service sees this as unix:srs from inside its chroot.
socketmap = unix:/var/spool/postfix/srs

secrets-file = "/etc/postsrsd.secret"
original-envelope = embedded
unprivileged-user = "postsrsd"
chroot-dir = "/var/lib/postsrsd"
seccomp = on
